name: Schema Drift Check

on:
  schedule:
    - cron: '0 8 * * 1,4'  # Monday and Thursday 8am UTC
  workflow_dispatch: {}  # Manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - run: npm install

      - name: Fetch Rust schema contract
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/styrene-lab/omegon/main/core/crates/omegon-memory/schema-contract.json" \
            -o /tmp/rust-schema-contract.json
          echo "=== Rust schema contract ==="
          cat /tmp/rust-schema-contract.json

      - name: Validate TS migration covers Rust schema
        run: |
          npx tsx scripts/validate-schema-contract.mjs /tmp/rust-schema-contract.json
